appId: io.github.shirowwww.achievement.watcher
productName: 'Achievement Watcher'
npmRebuild: false

# Copies watchdog/node_modules into the packed app. electron-builder's
# extraFiles object form drops node_modules, which otherwise leaves the
# Watchdog unable to start after install (missing @xan105/log etc.).
afterPack: ./build/afterPack.js

# Overlay notification presets and sounds must live on disk (not inside app.asar) so the
# notification window can loadFile() preset HTML and play sound files via file:// URLs.
asarUnpack:
  - presets/**
  - sounds/**

publish:
  provider: github
  owner: Shirowwww
  repo: Achievement-Watcher-3.0

win:
  icon: build/icon.ico
  target: nsis
  artifactName: 'Achievement.Watcher.Setup.${version}.${ext}'

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  displayLanguageSelector: false
  warningsAsErrors: false
  deleteAppDataOnUninstall: false
  installerSidebar: left.bmp
  installerIcon: build/icon.ico
  differentialPackage: true

directories:
  buildResources: ./build

files:
  - '**/*'
  - '!**/*.map'
  - '!dist/**'
  - '!buildme.cmd'
  - '!watchdog/_wip_/**'
  - '!watchdog/patches/**'

extraFiles:
  - from: ../watchdog
    to: ./watchdog
    filter:
      - '**/*'
      - '!watchdog/_wip_/**'
      - '!watchdog/patches/**'

  # NOTE: the portable node/ (Node 14) is gone since the A2 koffi migration — the monitor now runs
  # under Electron's own Node via ELECTRON_RUN_AS_NODE (see launchWatchdog in electron/init.js).

  - from: ./media
    to: resources/userData/Media

  - from: ./Source
    to: resources/userData/Source

  - from: ./view
    to: resources/userData/view
