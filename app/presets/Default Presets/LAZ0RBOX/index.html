<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Popup Animation</title>
    <meta name="duration" content="4000" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      body {
        transform-origin: center center;
      }
    </style>
  </head>
  <body>
    <meta width="600" height="150" />
    <div class="ach">
      <!-- în loc de icon din notificare, folosim direct GIF-ul -->
      <div class="icon">
        <img src="./giphy.gif" alt="Icon GIF" height="15" />
      </div>
      <div class="text_wrap">
        <p class="title"><span class="title-inner"></span></p>
        <span class="detail"></span>
      </div>
      <div class="ring-container">
        <div class="ringring"></div>
        <div class="circle">
          <!-- aici era psicon.png, acum e steamicon.png -->
          <img src="./steamicon.png" height="15" />
        </div>
      </div>
    </div>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const metaDur = document.querySelector('meta[name="duration"]');
        const baseTotal = Math.max(1, Number(metaDur?.content || 4000));
        const gifEl = document.querySelector(".icon img");
        const GIF_PLAYBACK_SETTLE_MS = 800;
        const getDuration = () =>
          Math.max(0, Number(metaDur?.content || baseTotal));
        async function waitForImageReady(imageEl) {
          if (!imageEl) return;
          if (imageEl.complete && imageEl.naturalWidth > 0) {
            if (typeof imageEl.decode === "function") {
              try {
                await imageEl.decode();
              } catch {}
            }
            return;
          }
          await new Promise((resolve) => {
            const finish = async () => {
              imageEl.removeEventListener("load", finish);
              imageEl.removeEventListener("error", finish);
              if (typeof imageEl.decode === "function") {
                try {
                  await imageEl.decode();
                } catch {}
              }
              resolve();
            };
            imageEl.addEventListener("load", finish, { once: true });
            imageEl.addEventListener("error", finish, { once: true });
          });
        }
        function waitForPaintFrames(frameCount = 2) {
          return new Promise((resolve) => {
            const step = (remaining) => {
              if (remaining <= 0) {
                resolve();
                return;
              }
              requestAnimationFrame(() => step(remaining - 1));
            };
            step(frameCount);
          });
        }
        async function notifyScreenshotReady(
          delayMs = 0,
          playbackSettleMs = 0,
        ) {
          const safeDelay = Math.max(0, Number(delayMs) || 0);
          const safePlaybackSettle = Math.max(0, Number(playbackSettleMs) || 0);
          await waitForImageReady(gifEl);
          if (safeDelay > 0) {
            await new Promise((resolve) => setTimeout(resolve, safeDelay));
          }
          if (safePlaybackSettle > 0) {
            await new Promise((resolve) =>
              setTimeout(resolve, safePlaybackSettle),
            );
          }
          await waitForPaintFrames(2);
          window.api?.notificationRenderReady?.();
        }
        window.api.onNotification((notificationData) => {
          const titleEl = document.querySelector(".title");
          const titleInnerEl = document.querySelector(".title-inner");
          const detailEl = document.querySelector(".detail");

          if (
            notificationData &&
            notificationData.displayName &&
            notificationData.description
            // iconPath îl ignorăm CA SĂ RĂMÂNĂ GIF-ul
          ) {
            titleInnerEl.textContent = notificationData.displayName;
            detailEl.textContent = notificationData.description;

            // păstrăm logica de scale
            const scale = Math.max(
              0.01,
              parseFloat(notificationData.scale || 1),
            );
            const container = document.querySelector(".ach");
            container?.style?.setProperty("--scale", String(scale));
          }

          const container = document.querySelector(".ach");
          const total = getDuration();
          const timelineScale = Math.max(0.1, total / baseTotal);
          const inDur = Math.max(120, Math.round(500 * timelineScale));
          const outDur = Math.max(120, Math.round(500 * timelineScale));
          const outDelay = Math.max(0, total - outDur);
          container?.style?.setProperty("--inDur", `${inDur}ms`);
          container?.style?.setProperty("--outDur", `${outDur}ms`);
          container?.style?.setProperty("--outDelay", `${outDelay}ms`);
          container?.style?.setProperty(
            "--timeline-scale",
            String(timelineScale),
          );
          container.classList.add("active");
          void notifyScreenshotReady(
            inDur + 80,
            Math.max(220, Math.round(GIF_PLAYBACK_SETTLE_MS * timelineScale)),
          );

          // marquee doar dacă overflow-ează
          requestAnimationFrame(() => {
            try {
              titleInnerEl.getAnimations().forEach((a) => a.cancel());
            } catch {}
            titleEl.classList.remove("marquee");
            void titleEl.offsetWidth;
            const overflowX =
              (titleInnerEl.scrollWidth || 0) - (titleEl.clientWidth || 0);
            if (overflowX > 0) {
              const px = Math.ceil(overflowX + 24);
              titleEl.classList.add("marquee");
              titleInnerEl.animate(
                [
                  { transform: "translateX(0)" },
                  { transform: `translateX(-${px}px)` },
                ],
                {
                  duration: Math.max(3000, Math.round(px / 50) * 1000),
                  delay: 1200,
                  easing: "linear",
                  fill: "both",
                },
              );
            }
          });

          // închiderea rămâne IDENTICĂ
          setTimeout(() => {
            container.classList.remove("active");
            window.api.closeNotificationWindow();
          }, total);
        });
      });
    </script>
  </body>
</html>
