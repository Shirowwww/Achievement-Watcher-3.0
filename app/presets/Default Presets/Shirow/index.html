<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Shirow Notification</title>
    <meta name="duration" content="6000" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body {
        transform-origin: center center;
      }
    </style>
  </head>
  <body>
    <meta width="400" height="150" />
    <div class="ach">
      <div class="icon"><img src="" alt="Icon" /></div>
      <div class="text_wrap">
        <p class="title"><span class="scroll"></span></p>
        <span class="detail"><span class="scroll"></span></span>
      </div>
    </div>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const metaDur = document.querySelector('meta[name="duration"]');
        const baseTotal = Math.max(1, Number(metaDur?.content || 6000));
        function notifyScreenshotReady(delayMs = 0) {
          const safeDelay = Math.max(0, Number(delayMs) || 0);
          setTimeout(() => {
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                window.api?.notificationRenderReady?.();
              });
            });
          }, safeDelay);
        }
        function applyAnchoringFromPosition(ach, posRaw) {
          const raw = String(posRaw || "").toLowerCase();
          const tokens = raw
            .replace(/[^a-z]+/g, " ")
            .trim()
            .split(/\s+/)
            .filter(Boolean);
          let isTop = tokens.includes("top") || tokens.includes("t");
          let isBottom = tokens.includes("bottom") || tokens.includes("b");
          if (!isTop && !isBottom) {
            try {
              const y = (window.screenY ?? window.screenTop ?? 0) | 0;
              const sh = (screen.availHeight || screen.height || 1080) | 0;
              const wh = (window.outerHeight || window.innerHeight || 0) | 0;
              const centerY = y + wh / 2;
              isTop = centerY < sh / 2;
              isBottom = !isTop;
            } catch {}
          }
          if (isTop && !isBottom) {
            ach.style.top = "30px";
            ach.style.bottom = "auto";
            ach.style.transformOrigin = "left top";
          } else {
            ach.style.bottom = "0px";
            ach.style.top = "auto";
            ach.style.transformOrigin = "left bottom";
          }
        }

        // Horizontally scroll an element (title or detail) when its text is wider than the
        // available area — a back-and-forth pan that pauses briefly at each end so it stays
        // readable for the whole time the notification is shown.
        function startMarquee(lineEl) {
          if (!lineEl) return;
          const inner = lineEl.querySelector(".scroll"); // the content that pans
          if (!inner) return;
          try {
            inner.getAnimations().forEach((a) => a.cancel());
          } catch {}
          inner.style.transform = "";
          void inner.offsetWidth;
          const overflow = Math.round(
            (inner.scrollWidth || 0) - (lineEl.clientWidth || 0)
          );
          if (overflow > 2) {
            const px = Math.ceil(overflow + 16);
            inner.animate(
              [
                { transform: "translateX(0)" },
                { transform: "translateX(0)", offset: 0.12 },
                { transform: `translateX(-${px}px)`, offset: 0.88 },
                { transform: `translateX(-${px}px)` },
              ],
              {
                duration: Math.max(4000, Math.round(px / 35) * 1000),
                iterations: Infinity,
                direction: "alternate",
                easing: "linear",
              }
            );
          }
        }
        function startMarqueeIfOverflow() {
          startMarquee(document.querySelector(".title"));
          startMarquee(document.querySelector(".detail"));
        }

        function startMarqueesAfterUnfurl(ach, timelineScale) {
          let started = false;
          const start = () => {
            if (started) return;
            started = true;
            ach.removeEventListener("animationend", onAnimationEnd);
            requestAnimationFrame(() =>
              requestAnimationFrame(startMarqueeIfOverflow)
            );
          };
          const onAnimationEnd = (event) => {
            if (event.target === ach && event.animationName === "aw-unfurl") {
              start();
            }
          };
          ach.addEventListener("animationend", onAnimationEnd);
          // Fallback for environments where animation events are disabled or skipped.
          setTimeout(start, Math.round(1050 * timelineScale + 300));
        }

        function applyRarityTier(ach, value) {
          ach.classList.remove("rarity-gold", "rarity-silver", "rarity-bronze");
          if (value == null || value === "") return;
          const percent = Number(value);
          if (!Number.isFinite(percent) || percent < 0 || percent > 10) return;
          if (percent < 3) ach.classList.add("rarity-gold");
          else if (percent < 6) ach.classList.add("rarity-silver");
          else ach.classList.add("rarity-bronze");
        }

        function pauseMarquees() {
          document.querySelectorAll(".title .scroll, .detail .scroll").forEach((inner) => {
            try {
              inner.getAnimations().forEach((animation) => animation.pause());
            } catch {}
          });
        }

        window.api.onNotification((data) => {
          const title = document.querySelector(".title .scroll");
          const detail = document.querySelector(".detail .scroll");
          const icon = document.querySelector(".icon img");
          const ach = document.querySelector(".ach");
          title.textContent = data?.displayName || "";
          detail.textContent = data?.description || "";
          if (data?.iconPath || data?.icon) {
            const p = String(data.iconPath || data.icon).replace(/\\/g, "/");
            icon.src = p.startsWith("file://") ? p : `file:///${p}`;
          }
          const scale = Math.max(0.01, parseFloat(data?.scale || 1) || 1);
          ach.style.setProperty("--scale", String(scale));

          const posValue = (
            data?.position ??
            data?.presetPosition ??
            data?.pos ??
            data?.corner ??
            ""
          ).toString();
          applyAnchoringFromPosition(ach, posValue);
          applyRarityTier(ach, data?.rarityPercent);

          const total = Math.max(
            0,
            Number(metaDur?.content || baseTotal || 6000)
          );
          const timelineScale = Math.max(0.1, total / baseTotal);
          document.documentElement.style.setProperty(
            "--timeline-scale",
            timelineScale.toFixed(4)
          );
          ach.classList.add("active");
          startMarqueesAfterUnfurl(ach, timelineScale);
          notifyScreenshotReady(Math.max(500, Math.round(1500 * timelineScale)));
          setTimeout(() => {
            // Keep .active while the reverse unfurl plays, then close the window.
            pauseMarquees();
            ach.classList.add("leaving");
            setTimeout(() => window.api?.closeNotificationWindow?.(), 760);
          }, total);
        });
      });
    </script>
  </body>
</html>
